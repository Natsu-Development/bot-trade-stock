services:
  # Nginx Reverse Proxy - Single entry point with HTTPS
  nginx:
    image: ${DOCKER_REGISTRY}/trading-frontend:${IMAGE_TAG:-latest}
    container_name: trading-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount Cloudflare Origin CA certificates from VPS
      - /etc/ssl/cloudflare:/etc/nginx/ssl:ro
    depends_on:
      bot-trade:
        condition: service_healthy
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.05'
          memory: 16M

  # Go Trading Bot Service
  bot-trade:
    image: ${DOCKER_REGISTRY}/trading-bot:${IMAGE_TAG:-latest}
    container_name: trading-bot
    # Internal only - accessible via nginx
    expose:
      - "8080"
    env_file:
      - .env.secrets      # MongoDB credentials and URI
      - .env.production   # All non-sensitive config
    volumes:
      # Mount the parent directory, not the single file. refresh-cookies.sh writes
      # the env file via `mv tmp $ENV_OUT`, which replaces the inode. Bind-mounting
      # a single file pins the container to the original inode and SIGHUP reloads
      # would re-read the stale file. Mounting the directory makes the rename visible.
      - /etc/bot-trade:/etc/bot-trade:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.25'
          memory: 64M

  # FlareSolverr - Cloudflare challenge solver for SSI cookie refresh
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      LOG_HTML: "false"
      CAPTCHA_SOLVER: none
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "127.0.0.1:8191:8191"   # localhost-only; refresh-cookies.sh hits 127.0.0.1
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8191/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 100M

  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: trading-mongo
    ports:
      - "27017:27017"
    env_file:
      - .env.secrets
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=bot_trade
    volumes:
      - mongo-data:/data/db
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Grafana Alloy - Unified metrics and logs collector
  alloy:
    image: grafana/alloy:v1.4.0
    container_name: trading-alloy
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy
    environment:
      - GRAFANA_CLOUD_PROMETHEUS_USER=${GRAFANA_CLOUD_PROMETHEUS_USER}
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
      - GRAFANA_CLOUD_PROMETHEUS_URL=${GRAFANA_CLOUD_PROMETHEUS_URL}
      - GRAFANA_CLOUD_LOKI_URL=${GRAFANA_CLOUD_LOKI_URL}
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # cAdvisor - Container metrics collector
  cadvisor:
    image: ghcr.io/google/cadvisor:0.56.2
    container_name: trading-cadvisor
    privileged: true
    devices:
    - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
    expose:
      - "8080"
    networks:
      - trading-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

networks:
  trading-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  alloy-data:
    driver: local