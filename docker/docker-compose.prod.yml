services:
  # Nginx Reverse Proxy - Single entry point
  nginx:
    image: ${DOCKER_REGISTRY}/trading-frontend:${IMAGE_TAG:-latest}
    container_name: trading-nginx
    ports:
      - "80:80"
    depends_on:
      bot-trade:
        condition: service_healthy
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Go Trading Bot Service
  bot-trade:
    image: ${DOCKER_REGISTRY}/trading-bot:${IMAGE_TAG:-latest}
    container_name: trading-bot
    # Internal only - accessible via nginx
    expose:
      - "8080"
    env_file:
      - .env.secrets      # MongoDB credentials and URI
      - .env.production   # All non-sensitive config
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 -O /dev/null http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: trading-mongo
    ports:
      - "27017:27017"
    env_file:
      - .env.secrets
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=bot_trade
    volumes:
      - mongo-data:/data/db
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Grafana Alloy - Unified metrics and logs collector
  alloy:
    image: grafana/alloy:v1.4.0
    container_name: trading-alloy
    volumes:
      - ./monitoring/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy
    environment:
      - GRAFANA_CLOUD_PROMETHEUS_USER=${GRAFANA_CLOUD_PROMETHEUS_USER}
      - GRAFANA_CLOUD_LOKI_USER=${GRAFANA_CLOUD_LOKI_USER}
      - GRAFANA_CLOUD_API_KEY=${GRAFANA_CLOUD_API_KEY}
      - GRAFANA_CLOUD_PROMETHEUS_URL=${GRAFANA_CLOUD_PROMETHEUS_URL}
      - GRAFANA_CLOUD_LOKI_URL=${GRAFANA_CLOUD_LOKI_URL}
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy
      - --server.http.listen-addr=0.0.0.0:12345
    ports:
      - "12345:12345"
    networks:
      - trading-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:12345/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  trading-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  alloy-data:
    driver: local